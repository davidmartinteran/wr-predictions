<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Porra Mundial 2026 — Pantallas (Mobile + Desktop)</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body {
    margin: 0;
    font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: #050506;
    color: #f4f4f5;
    -webkit-font-smoothing: antialiased;
  }
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { scrollbar-width: none; }
  input[type=tel]::-webkit-outer-spin-button, input[type=tel]::-webkit-inner-spin-button { display: none; }
  button, input { -webkit-tap-highlight-color: transparent; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="screens-mobile.jsx"></script>
<script type="text/babel" src="screens-desktop.jsx"></script>

<script type="text/babel">
function Pantallas() {
  return (
    <window.DesignCanvas>
      <window.DCSection id="mobile" title="Mobile · 390×844" subtitle="PWA en uso normal — viendo partidos por la noche">
        <window.DCArtboard id="m-pron" label="Pronósticos · Fase de grupos" width={390} height={844}>
          <window.MobilePronosticos/>
        </window.DCArtboard>
        <window.DCArtboard id="m-rank" label="Clasificación · Live" width={390} height={844}>
          <window.MobileClasificacion/>
        </window.DCArtboard>
        <window.DCArtboard id="m-brack" label="Bracket · Eliminatorias" width={390} height={844}>
          <window.MobileBracket/>
        </window.DCArtboard>
      </window.DCSection>

      <window.DCSection id="desktop" title="Desktop · 1440×900" subtitle="Para meter pronósticos en serio o ver la clasificación en pantalla grande">
        <window.DCArtboard id="d-pron" label="Pronósticos · Fase de grupos" width={1440} height={900}>
          <window.DesktopPronosticos/>
        </window.DCArtboard>
        <window.DCArtboard id="d-rank" label="Clasificación · Tabla completa" width={1440} height={900}>
          <window.DesktopClasificacion/>
        </window.DCArtboard>
        <window.DCArtboard id="d-brack" label="Bracket · Árbol horizontal" width={1440} height={900}>
          <window.DesktopBracket/>
        </window.DCArtboard>
      </window.DCSection>
    </window.DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Pantallas/>);
</script>
</body>
</html>
